name: Deploy

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: actions/cache@v6
        with:
          path: '**/node_modules'
          key: ${{ runner.os }}-modules-${{ hashFiles('**/yarn.lock') }}-${{ hashFiles('patches/**') }}

      - name: Enable Corepack
        run: corepack enable

      - name: Use Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: yarn

      - name: Install Dependencies
        run: yarn install

      - name: Build Site
        run: yarn workspace frontend-legacy build
        env:
          VITE_BAOSHUO_CDNJS: true

      - name: Deploy site to server (Tokyo, JP)
        uses: easingthemes/ssh-deploy@v2.1.5
        env:
          ARGS: '-avz --delete'
          SOURCE: apps/frontend-legacy/dist/
          REMOTE_HOST: ${{ secrets.REMOTE_HOST }}
          REMOTE_USER: ${{ secrets.REMOTE_USER }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          TARGET: ${{ secrets.REMOTE_PATH }}
          EXCLUDE: .git,.github,.gitlab-ci.yml,.nojekyll

      - name: Deploy site to server (Hong Kong, CN)
        uses: easingthemes/ssh-deploy@v2.1.5
        env:
          ARGS: '-avz --delete'
          SOURCE: apps/frontend-legacy/dist/
          REMOTE_HOST: ${{ secrets.REMOTE_HOST_2 }}
          REMOTE_USER: ${{ secrets.REMOTE_USER }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          TARGET: ${{ secrets.REMOTE_PATH }}
          EXCLUDE: .git,.github,.gitlab-ci.yml,.nojekyll
